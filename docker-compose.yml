version: '3.8'

services:
  kyc-verifier:
    build: .
    container_name: kyc-verifier
    ports:
      - "8080:8080"
    environment:
      - COMPREFACE_URL=http://localhost:8000
      - COMPREFACE_API_KEY=${COMPREFACE_API_KEY:-}
      - OCR_LANG=ch
    network_mode: "host"   # Allows easy access to CompreFace running on host (localhost:8000). Linux only.
    restart: unless-stopped
    # Optional: mount for persistent model cache or uploads (uncomment if needed)
    # volumes:
    #   - ~/.paddleocr:/root/.paddleocr  # cache models
    #   - ./uploads:/app/uploads

# Usage:
# 1. Copy .env.example to .env and set your COMPREFACE_API_KEY
# 2. docker compose up --build -d
# API will be available at http://localhost:8080/docs (Swagger)